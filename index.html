<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bibliothèque</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Bibliothèque</h1>
  <input id="search" type="search" placeholder="Search title, author, tag…" autocomplete="off">

  <div id="filters">
    <select id="filter-tag">
      <option value="">Tag: All</option>
    </select>

    <select id="sort-key">
      <option value="date_added">Sort: Date added</option>
      <option value="quality_rating">Sort: Rating</option>
      <option value="authors">Sort: Author</option>
    </select>

    <select id="sort-dir">
      <option value="desc">New→Old / High→Low / Z→A</option>
      <option value="asc">Old→New / Low→High / A→Z</option>
    </select>

    <button id="filter-reset">Reset</button>
  </div>

  <div id="count"></div>
</header>

<main id="grid"></main>

<div id="modal-backdrop" class="hidden">
  <div id="modal">
    <button id="modal-close">✕</button>
    <img id="modal-cover" src="" alt="">
    <div id="modal-info">
      <h2 id="modal-title"></h2>
      <p id="modal-authors"></p>
      <p id="modal-rating"></p>
      <p id="modal-label"></p>
      <p id="modal-review"></p>
      <p id="modal-tags"></p>
      <p id="modal-pubdate"></p>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
